services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 22181:2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - 29092:29092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # IMPORTANTE: cuando corras cqrsquery en OTRA máquina, cambia localhost por 
      # la IP LAN de esta máquina (ej: 192.168.1.X). Encuentra tu IP con `ipconfig` 
      # en Windows o `ip a` en Linux.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mysql:
    image: mysql:8.0
    ports:
      - 3307:3306
    environment:
      - MYSQL_ROOT_PASSWORD=UPTC2024
      - MYSQL_DATABASE=orders
    volumes:
      - mysql_data:/var/lib/mysql

  mongodb:
    container_name: orderBD
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: UPTC2024
      MONGO_INITDB_DATABASE: CustomerOrderDB

  cqrscontroller:
    build:
      context: ./cqrscontroller
      dockerfile: Dockerfile
    ports:
      - "11080:11080"
    depends_on:
      - mysql
      - kafka
    environment:
      # Cambia localhost por la IP LAN si corres cqrsquery en otra máquina
      - KAFKA_HOST=kafka
      - MYSQL_HOST=mysql
    restart: on-failure

  cqrsquery:
    build:
      context: ./cqrsquery
      dockerfile: Dockerfile
    ports:
      - "12080:12080"
    depends_on:
      - mongodb
      - kafka
    environment:
      # Cambia localhost por la IP LAN si corres cqrscontroller en otra máquina
      - KAFKA_HOST=kafka
      - MONGO_HOST=mongodb
    restart: on-failure

# SERVICIO LEGACY DESACTIVADO - reemplazado por cqrscontroller y cqrsquery
# Descomentar solo si se necesita el servicio original para referencia
#  edakafka:
#    build:
#      context: ./edakafka
#      dockerfile: Dockerfile
#    ports:
#      - 8080:8080
#    depends_on:
#      - mysql
#      - kafka
#    environment:
#      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/orders?serverTimezone=GMT-5
#      - SPRING_DATASOURCE_USERNAME=orders
#      - SPRING_DATASOURCE_PASSWORD=uptc2026
#      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - 8081:8081
    depends_on:
      - cqrscontroller
      - cqrsquery

volumes:
  mysql_data:
