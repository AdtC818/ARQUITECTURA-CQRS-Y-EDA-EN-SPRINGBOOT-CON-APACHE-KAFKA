spring.application.name=cqrscontroller
server.port=11080

# === CONFIGURACIÓN DE RED PARA MÁQUINAS DISTINTAS ===
# Cambia {MYSQL_HOST} si pones MySQL en otra máquina (e.g. MYSQL_HOST=192.168.1.50)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3307/orders?serverTimezone=GMT-5
spring.datasource.username=root
spring.datasource.password=UPTC2024

spring.jpa.database=mysql
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Cambia {KAFKA_HOST} por la IP LAN del servidor donde corra Docker con Kafka
spring.kafka.bootstrap-servers=${KAFKA_HOST:localhost}:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer