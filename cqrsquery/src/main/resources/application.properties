spring.application.name=cqrsquery
server.port=12080
spring.main.allow-bean-definition-overriding=true

# === CONFIGURACIÓN DE RED PARA MÁQUINAS DISTINTAS ===
# Cambia {MONGO_HOST} por la IP de la máquina donde corra MongoDB/Docker
spring.data.mongodb.host=${MONGO_HOST:mongodb}
spring.data.mongodb.port=27017
spring.data.mongodb.database=CustomerOrderDB
spring.data.mongodb.username=admin
spring.data.mongodb.password=UPTC2024
spring.data.mongodb.authentication-database=admin

# Cambia {KAFKA_HOST} por la IP LAN del servidor donde corra Docker con Kafka
spring.kafka.bootstrap-servers=${KAFKA_HOST:localhost}:9092
spring.kafka.consumer.group-id=customer-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer